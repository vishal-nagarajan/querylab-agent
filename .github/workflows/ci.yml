name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build agent
        run: ./mvnw -B verify

      - name: Run sample (acceptance test for N+1 capture)
        run: |
          cd examples/orders-sample
          ../../mvnw -B test
          test -f target/queryreport/index.html || (echo "report not generated" && exit 1)
          test -f target/queryreport/run.json   || (echo "json not generated"   && exit 1)
